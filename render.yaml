services:
  # ── Backend: FastAPI ──────────────────────────────────────────────────────
  - type: web
    name: shadow-learner-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random string
      - key: GEMINI_API_KEY
        sync: false                  # You set this manually in the Render dashboard
      - key: DATABASE_URL
        value: sqlite:///./visuallearn.db
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Frontend: React / Vite ───────────────────────────────────────────────
  - type: web
    name: shadow-learner-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false                  # You set this to your backend URL after first deploy
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html     # SPA fallback for React Router
